<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>足音プレイヤー＆カウンター（カメラ連動・PC用）</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px; }
    #count { font-size: 100px; color: #2a7; margin: 10px; }
    #side { font-size: 40px; margin: 10px; }
    #status { font-size: 22px; color: #666; margin: 15px; }
    #zone { font-size: 22px; margin: 10px; padding: 8px; border-radius: 8px; }
    .in { background: #2a7; color: white; }
    .out { background: #eee; color: #666; }
    #conn { font-size: 18px; color: #888; }
    #soundState { font-size: 20px; margin: 10px; }
    button { font-size: 22px; padding: 15px 40px; margin: 10px; }
  </style>
</head>
<body>
  <h2>足音プレイヤー＆カウンター（カメラ連動）</h2>
  <button id="soundBtn">🔊 音を有効にする</button>
  <div id="soundState">音: オフ（数字のみ表示中）</div>
  <div id="zone" class="out">ゾーン: 人がいません</div>
  <div>受信した歩数</div>
  <div id="count">0</div>
  <div id="side">-</div>
  <div id="status">スマホの歩行を待っています</div>
  <div id="conn">Firebase: 未接続</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBr20JpcVm6BQ3vmFKnqBebsqBZ9gh-AIA",
      authDomain: "walk-sound.firebaseapp.com",
      databaseURL: "https://walk-sound-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "walk-sound",
      storageBucket: "walk-sound.firebasestorage.app",
      messagingSenderId: "412603374687",
      appId: "1:412603374687:web:f073d8083e2c4a81a18fea"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const stepRef = ref(db, 'step');
    const zoneRef = ref(db, 'zone');
    document.getElementById('conn').textContent = 'Firebase: 接続済み';

    const soundBtn = document.getElementById('soundBtn');
    const soundState = document.getElementById('soundState');
    const countEl = document.getElementById('count');
    const sideEl = document.getElementById('side');
    const statusEl = document.getElementById('status');
    const zoneEl = document.getElementById('zone');

    // 足音ファイルを準備
    const footAudio = new Audio('footstep-star.mp3');
    let soundOn = false;

    function playFootstep() {
      if (!soundOn) return;
      footAudio.currentTime = 0;   // 鳴らすたびに最初から
      footAudio.play().catch(() => {});
    }

    // 音を有効にするボタン（ユーザー操作のうちに一度再生準備する）
    soundBtn.addEventListener('click', () => {
      footAudio.play().then(() => {
        footAudio.pause();
        footAudio.currentTime = 0;
        soundOn = true;
        soundState.textContent = '音: オン';
      }).catch(() => {
        soundState.textContent = '音の準備に失敗しました';
      });
      soundBtn.style.display = 'none';
    });

    // ゾーンの状態を表示（カメラの検知結果）
    onValue(zoneRef, (snapshot) => {
      const data = snapshot.val();
      const present = data && data.present === true;
      if (present) {
        zoneEl.textContent = 'ゾーン: 人がいます';
        zoneEl.className = 'in';
      } else {
        zoneEl.textContent = 'ゾーン: 人がいません';
        zoneEl.className = 'out';
      }
    });

    // 歩行を受信して足音を鳴らす・カウント
    let lastTime = 0;
    let count = 0;
    onValue(stepRef, (snapshot) => {
      const data = snapshot.val();
      if (!data || !data.time) return;
      if (data.time === lastTime) return;
      lastTime = data.time;

      count++;
      countEl.textContent = count;
      sideEl.textContent = (data.side === 'L' ? '左足' : '右足');
      statusEl.textContent = '最終受信: ' + new Date(data.time).toLocaleTimeString();
      playFootstep();
    });
  </script>
</body>
</html>
