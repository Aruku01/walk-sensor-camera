<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>足音プレイヤー（カメラ連動・PC用）</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', sans-serif;
      color: #e8ecff;
      background: radial-gradient(ellipse at bottom, #1b2340 0%, #0a0e1f 60%, #05060d 100%);
      min-height: 100vh;
      overflow: hidden;
      text-align: center;
    }
    /* 背景の星 */
    #starfield { position: fixed; inset: 0; z-index: 0; }
    .container { position: relative; z-index: 2; padding: 40px 20px; }
    h2 { font-weight: 300; letter-spacing: 3px; font-size: 26px; margin-bottom: 30px; color: #cdd6ff; }
    .btn {
      font-size: 18px; padding: 14px 36px; margin: 10px;
      color: #e8ecff; background: rgba(120,140,255,0.15);
      border: 1px solid rgba(150,170,255,0.5); border-radius: 30px;
      cursor: pointer; letter-spacing: 1px; transition: 0.3s;
      backdrop-filter: blur(4px);
    }
    .btn:hover { background: rgba(120,140,255,0.3); }
    #soundState { font-size: 15px; color: #8a97c8; margin: 10px 0 30px; letter-spacing: 1px; }
    #zone {
      display: inline-block; font-size: 18px; margin: 10px 0 30px;
      padding: 8px 24px; border-radius: 30px; letter-spacing: 1px;
    }
    .in { background: rgba(90,200,160,0.25); border: 1px solid rgba(120,230,190,0.6); color: #b6ffe4; }
    .out { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); color: #8a97c8; }
    .label { font-size: 15px; color: #8a97c8; letter-spacing: 2px; }
    #count {
      font-size: 130px; font-weight: 200; line-height: 1.1;
      background: linear-gradient(180deg, #ffffff, #9fb3ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(150,180,255,0.4);
    }
    #side { font-size: 34px; font-weight: 300; margin: 6px 0; color: #cdd6ff; letter-spacing: 4px; }
    #status { font-size: 15px; color: #6b78a8; margin-top: 20px; letter-spacing: 1px; }
    #conn { font-size: 13px; color: #4a5580; margin-top: 8px; }
    /* 流れ星 */
    .shooting-star {
      position: fixed; z-index: 1; width: 4px; height: 4px;
      background: #fff; border-radius: 50%;
      box-shadow: 0 0 8px 2px rgba(200,220,255,0.9);
      pointer-events: none;
    }
    .shooting-star::after {
      content: ''; position: absolute; top: 1px; right: 3px;
      width: 120px; height: 2px;
      background: linear-gradient(90deg, rgba(200,220,255,0.9), transparent);
    }
  </style>
</head>
<body>
  <canvas id="starfield"></canvas>
  <div class="container">
    <h2>✦ FOOTSTEP UNIVERSE ✦</h2>
    <button class="btn" id="soundBtn">🔊 音を有効にする</button>
    <div id="soundState">音: オフ（数字のみ表示中）</div>
    <div id="zone" class="out">ゾーン: 人がいません</div>
    <div class="label">STEPS</div>
    <div id="count">0</div>
    <div id="side">—</div>
    <div id="status">スマホの歩行を待っています</div>
    <div id="conn">Firebase: 未接続</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBr20JpcVm6BQ3vmFKnqBebsqBZ9gh-AIA",
      authDomain: "walk-sound.firebaseapp.com",
      databaseURL: "https://walk-sound-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "walk-sound",
      storageBucket: "walk-sound.firebasestorage.app",
      messagingSenderId: "412603374687",
      appId: "1:412603374687:web:f073d8083e2c4a81a18fea"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const stepRef = ref(db, 'step');
    const zoneRef = ref(db, 'zone');
    document.getElementById('conn').textContent = 'Firebase: 接続済み';

    const soundBtn = document.getElementById('soundBtn');
    const soundState = document.getElementById('soundState');
    const countEl = document.getElementById('count');
    const sideEl = document.getElementById('side');
    const statusEl = document.getElementById('status');
    const zoneEl = document.getElementById('zone');

    const footAudio = new Audio('footstep-star.mp3');
    let soundOn = false;

    function playFootstep() {
      if (!soundOn) return;
      footAudio.currentTime = 0;
      footAudio.play().catch(() => {});
    }

    soundBtn.addEventListener('click', () => {
      footAudio.play().then(() => {
        footAudio.pause(); footAudio.currentTime = 0;
        soundOn = true; soundState.textContent = '音: オン';
      }).catch(() => { soundState.textContent = '音の準備に失敗しました'; });
      soundBtn.style.display = 'none';
    });

    onValue(zoneRef, (snapshot) => {
      const data = snapshot.val();
      const present = data && data.present === true;
      zoneEl.textContent = present ? 'ゾーン: 人がいます' : 'ゾーン: 人がいません';
      zoneEl.className = present ? 'in' : 'out';
    });

    let lastTime = 0, count = 0;
    onValue(stepRef, (snapshot) => {
      const data = snapshot.val();
      if (!data || !data.time) return;
      if (data.time === lastTime) return;
      lastTime = data.time;
      count++;
      countEl.textContent = count;
      sideEl.textContent = (data.side === 'L' ? '◀ 左足' : '右足 ▶');
      statusEl.textContent = '最終受信: ' + new Date(data.time).toLocaleTimeString();
      playFootstep();
      shootStar();       // 歩数が増えるたびに流れ星
      pulseCount();
    });

    // カウントが増えたときの光る演出
    function pulseCount() {
      countEl.style.transition = 'none';
      countEl.style.textShadow = '0 0 60px rgba(180,200,255,0.9)';
      setTimeout(() => {
        countEl.style.transition = 'text-shadow 0.6s';
        countEl.style.textShadow = '0 0 40px rgba(150,180,255,0.4)';
      }, 50);
    }

    // 流れ星を1つ飛ばす
    function shootStar() {
      const star = document.createElement('div');
      star.className = 'shooting-star';
      const startX = Math.random() * window.innerWidth * 0.5;
      const startY = Math.random() * window.innerHeight * 0.4;
      star.style.left = startX + 'px';
      star.style.top = startY + 'px';
      document.body.appendChild(star);
      const dist = 300 + Math.random() * 200;
      star.animate([
        { transform: 'translate(0,0)', opacity: 1 },
        { transform: `translate(${dist}px, ${dist*0.6}px)`, opacity: 0 }
      ], { duration: 900, easing: 'ease-out' });
      setTimeout(() => star.remove(), 950);
    }

    // 背景の星空（canvasにきらめく星を描く）
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function initStars() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      stars = [];
      const n = Math.floor((canvas.width * canvas.height) / 4000);
      for (let i = 0; i < n; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.4 + 0.3,
          tw: Math.random() * Math.PI * 2
        });
      }
    }
    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const s of stars) {
        s.tw += 0.02;
        const alpha = 0.4 + Math.sin(s.tw) * 0.4;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(220,230,255,${alpha})`;
        ctx.fill();
      }
      requestAnimationFrame(drawStars);
    }
    initStars();
    drawStars();
    window.addEventListener('resize', initStars);
  </script>
</body>
</html>
